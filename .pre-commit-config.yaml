# Guards against committing personal data into a public repo.
# Install once with:  pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: block-personal-artifacts
        name: block trips.json / photo library / output
        entry: bash -c 'git diff --cached --name-only | grep -E "(^|/)(trips\.json|config\.toml)$|\.photoslibrary/|^output/|^exports/" && { echo "Refusing to commit personal artifact (see .gitignore)."; exit 1; } || exit 0'
        language: system
        pass_filenames: false
      - id: block-coordinates
        name: block raw lat/lon coordinate pairs in shareable docs
        # Coordinate literals in code (synthetic fixtures, demo.py) are fine;
        # the risk is a real coordinate pasted into a shareable doc. So scan
        # only staged markdown/text docs, not src/, tests/, or assets/.
        entry: bash -c 'files=$(git diff --cached --name-only --diff-filter=AM | grep -vE "^(src/|tests/|assets/)" | grep -E "\.(md|markdown|txt|rst)$" || true); [ -z "$files" ] && exit 0; if grep -EHn -- "-?[0-9]{1,3}\.[0-9]{3,}[[:space:]]*,[[:space:]]*-?[0-9]{1,3}\.[0-9]{3,}" $files; then echo "A shareable doc contains a coordinate pair; remove it before committing."; exit 1; fi; exit 0'
        language: system
        pass_filenames: false

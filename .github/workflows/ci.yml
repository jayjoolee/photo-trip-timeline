name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The algorithm core is osxphotos-free, so the whole suite runs on Linux.
      # pyproject sets pythonpath=["src"], so pytest imports the package without
      # an editable install (which would pull osxphotos, a macOS-only dependency).
      - run: pip install pytest
      - run: pytest -q

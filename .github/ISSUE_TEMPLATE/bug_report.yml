name: Bug report
description: Report something that doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! **Please do not paste real coordinates, your home
        location, or your real `trips.json`.** Reproduce with `phototrips --demo`
        or the synthetic fixtures in `tests/` instead.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have not pasted any real GPS coordinates, home location, or personal `trips.json` in this issue.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally using `phototrips --demo` or a synthetic fixture.
  - type: input
    id: versions
    attributes:
      label: Environment
      description: macOS version, Python version, osxphotos version, Photos library version (from any startup note).
      placeholder: "macOS 14.5, Python 3.12, osxphotos 0.76.1, Photos library 5001"
